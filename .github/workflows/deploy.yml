name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: ["main"] # Triggers the script when you push to the main branch
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps: deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9 # Matches your pnpm workspace setup

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        # --filter Frontend tells pnpm to only install dependencies for your Frontend workspace app
        run: pnpm install --filter Frontend...

      - name: Build Frontend static assets
        # Navigates into the folder and builds the project
        run: |
          cd Frontend
          pnpm build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Points directly to your compiled frontend files. 
          # Change "dist" to "build" or "out" if you use Next.js/Create React App instead of Vite.
          path: './Frontend/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
